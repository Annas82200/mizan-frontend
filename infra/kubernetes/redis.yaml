apiVersion: apps/v1
kind: Deployment
metadata:
  name: mizan-redis
  namespace: mizan
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mizan-redis
  template:
    metadata:
      labels:
        app: mizan-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          command: ["redis-server", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mizan-redis
  namespace: mizan
spec:
  selector:
    app: mizan-redis
  ports:
    - port: 6379
      targetPort: 6379
  type: ClusterIP
