apiVersion: apps/v1
kind: Deployment
metadata:
  name: mizan-backend
  namespace: mizan
  labels:
    app: mizan-backend
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mizan-backend
  template:
    metadata:
      labels:
        app: mizan-backend
    spec:
      containers:
        - name: backend
          image: mizan/backend:latest
          ports:
            - containerPort: 5001
          envFrom:
            - secretRef:
                name: mizan-secrets
            - configMapRef:
                name: mizan-config
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5001
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: mizan-backend
  namespace: mizan
spec:
  selector:
    app: mizan-backend
  ports:
    - port: 5001
      targetPort: 5001
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mizan-backend-hpa
  namespace: mizan
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mizan-backend
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
