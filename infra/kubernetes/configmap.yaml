apiVersion: v1
kind: ConfigMap
metadata:
  name: mizan-config
  namespace: mizan
data:
  NODE_ENV: "production"
  PORT: "5001"
  FRONTEND_URL: "https://app.mizan.app"
  REDIS_URL: "redis://mizan-redis:6379"
  MISTRAL_MODEL: "mistral-large-latest"
  CLAUDE_MODEL: "claude-sonnet-4-20250514"
  GEMINI_MODEL: "gemini-1.5-pro"
  DB_POOL_MAX: "20"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mizan-frontend-config
  namespace: mizan
data:
  NEXT_PUBLIC_API_URL: "https://app.mizan.app/api"
  NEXT_PUBLIC_WS_URL: "wss://app.mizan.app"
---
# IMPORTANT: Secrets must NOT be stored in git.
# Create secrets manually via:
#   kubectl create secret generic mizan-secrets --from-env-file=.env -n mizan
# Required secret keys: DATABASE_URL, JWT_SECRET, ANTHROPIC_API_KEY, MISTRAL_API_KEY, GOOGLE_AI_API_KEY, SENDGRID_API_KEY
