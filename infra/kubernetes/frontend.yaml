apiVersion: apps/v1
kind: Deployment
metadata:
  name: mizan-frontend
  namespace: mizan
  labels:
    app: mizan-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mizan-frontend
  template:
    metadata:
      labels:
        app: mizan-frontend
    spec:
      containers:
        - name: frontend
          image: mizan/frontend:latest
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: mizan-frontend-config
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: mizan-frontend
  namespace: mizan
spec:
  selector:
    app: mizan-frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
