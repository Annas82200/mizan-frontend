apiVersion: apps/v1
kind: Deployment
metadata:
  name: mizan-workers
  namespace: mizan
  labels:
    app: mizan-workers
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mizan-workers
  template:
    metadata:
      labels:
        app: mizan-workers
    spec:
      containers:
        - name: hris-sync-worker
          image: mizan/backend:latest
          command: ["node", "dist/infrastructure/bullmq/workers/hris-sync.worker.js"]
          envFrom:
            - secretRef:
                name: mizan-secrets
            - configMapRef:
                name: mizan-config
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mizan-workers-hpa
  namespace: mizan
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mizan-workers
  minReplicas: 1
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
